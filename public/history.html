<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ride History – SafeHer Ride</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            background: var(--gray-100);
        }

        .history-page {
            max-width: 640px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        .history-header {
            background: linear-gradient(135deg, var(--black), var(--dark));
            color: white;
            border-radius: var(--radius-xl);
            padding: 28px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .history-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 80% 50%, rgba(233, 30, 140, 0.25) 0%, transparent 60%);
        }

        .history-header>* {
            position: relative;
            z-index: 1;
        }

        .ride-history-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid var(--gray-100);
        }

        .ride-history-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateX(4px);
        }

        .ride-history-card.sos-ride {
            border-left: 4px solid var(--danger);
        }

        .ride-route {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            margin: 12px 0;
        }

        .stars-input {
            display: flex;
            gap: 4px;
        }

        .star-btn {
            background: none;
            font-size: 1.4rem;
            cursor: pointer;
            transition: transform 0.1s;
            line-height: 1;
            padding: 2px;
        }

        .star-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <nav class="navbar"><a href="index.html" class="nav-brand">
            <div class="logo-icon">🌸</div>SafeHer Ride
        </a>
        <div style="display:flex;gap:10px"><a href="booking.html" class="btn btn-primary btn-sm">Book Ride</a><a
                href="index.html" class="btn btn-sm" style="background:var(--gray-100)">Home</a>
            <button onclick="logout()" class="btn btn-sm btn-outline"><i class="fa-solid fa-right-from-bracket"></i>
                Logout</button>
        </div>
    </nav>
    <div class="history-page">
        <div class="history-header">
            <div
                style="font-size:0.8rem;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">
                RIDE HISTORY</div>
            <h2 style="font-size:1.4rem;margin-bottom:4px" id="historyUserName">Your Rides</h2>
            <div style="font-size:0.85rem;color:rgba(255,255,255,0.5)">Hyderabad · Women-Only Cab Service</div>
            <div style="display:flex;gap:20px;margin-top:16px">
                <div>
                    <div style="font-size:1.4rem;font-weight:800;color:var(--primary)" id="statRides">0</div>
                    <div style="font-size:0.75rem;color:rgba(255,255,255,0.4)">Total Rides</div>
                </div>
                <div>
                    <div style="font-size:1.4rem;font-weight:800;color:var(--success)" id="statSpent">₹0</div>
                    <div style="font-size:0.75rem;color:rgba(255,255,255,0.4)">Total Spent</div>
                </div>
                <div>
                    <div style="font-size:1.4rem;font-weight:800;color:var(--warning)" id="statAvgRating">--</div>
                    <div style="font-size:0.75rem;color:rgba(255,255,255,0.4)">Avg Rating</div>
                </div>
            </div>
        </div>

        <!-- Filter -->
        <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">
            <button class="filter-btn active" onclick="filterHistory('all')" id="fAll"
                style="border:1.5px solid var(--gray-200);padding:8px 16px;border-radius:var(--radius-full);font-size:0.82rem;font-weight:600;cursor:pointer;background:white;color:var(--black);white-space:nowrap">All
                Rides</button>
            <button class="filter-btn" onclick="filterHistory('completed')" id="fCompleted"
                style="border:1.5px solid var(--gray-200);padding:8px 16px;border-radius:var(--radius-full);font-size:0.82rem;font-weight:600;cursor:pointer;background:white;color:var(--gray-500);white-space:nowrap">Completed</button>
            <button class="filter-btn" onclick="filterHistory('cancelled')" id="fCancelled"
                style="border:1.5px solid var(--gray-200);padding:8px 16px;border-radius:var(--radius-full);font-size:0.82rem;font-weight:600;cursor:pointer;background:white;color:var(--gray-500);white-space:nowrap">Cancelled</button>
            <button class="filter-btn" onclick="filterHistory('sos')" id="fSos"
                style="border:1.5px solid rgba(239,68,68,0.3);padding:8px 16px;border-radius:var(--radius-full);font-size:0.82rem;font-weight:600;cursor:pointer;background:white;color:var(--danger);white-space:nowrap">SOS
                Rides</button>
        </div>

        <div id="historyList"></div>
        <a href="booking.html" class="btn btn-primary" style="width:100%;margin-top:24px;justify-content:center"><i
                class="fa-solid fa-car-side"></i> Book a New Ride</a>
    </div>

    <!-- Rating Modal -->
    <div class="modal-overlay" id="ratingModal">
        <div class="modal">
            <div class="modal-header">
                <h3>⭐ Rate Your Ride</h3><button class="modal-close" onclick="closeModal('ratingModal')">✕</button>
            </div>
            <div id="ratingDriverInfo" style="margin-bottom:20px"></div>
            <div style="text-align:center;margin-bottom:20px">
                <div style="font-size:0.9rem;font-weight:600;margin-bottom:10px">How was your experience?</div>
                <div class="stars-input" style="justify-content:center" id="starButtons">
                    <button class="star-btn" onclick="setRating(1)">☆</button>
                    <button class="star-btn" onclick="setRating(2)">☆</button>
                    <button class="star-btn" onclick="setRating(3)">☆</button>
                    <button class="star-btn" onclick="setRating(4)">☆</button>
                    <button class="star-btn" onclick="setRating(5)">☆</button>
                </div>
                <div style="font-size:0.85rem;margin-top:8px;color:var(--gray-500)" id="ratingLabel">Tap a star to rate
                </div>
            </div>
            <textarea id="feedbackText" placeholder="Share your experience (optional)..."
                style="width:100%;padding:12px;border:1.5px solid var(--gray-200);border-radius:var(--radius-md);resize:none;height:90px;font-family:var(--font-main);font-size:0.9rem"
                maxlength="300"></textarea>
            <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="submitRating()"><i
                    class="fa-solid fa-star"></i> Submit Rating</button>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="/js/app.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('safehercab_user') || '{}');
        if (!user.token) {
            window.location.href = 'auth.html'; // Basic auth guard
        }
        if (user.name) document.getElementById('historyUserName').textContent = `${user.name}'s Rides`;

        // Demo ride history data
        const demoRides = [
            { id: 'BK001', vehicleType: 'Cab', pickup: 'Banjara Hills', drop: 'HITEC City', fare: 85, status: 'completed', driver: 'Anjali Reddy', driverRating: 4.9, date: new Date(Date.now() - 3600000 * 2), rating: 5, vehicleNumber: 'TS09AB1234' },
            { id: 'BK002', vehicleType: 'Auto', pickup: 'Ameerpet', drop: 'Jubilee Hills', fare: 45, status: 'completed', driver: 'Sravani Patel', driverRating: 4.8, date: new Date(Date.now() - 3600000 * 26), rating: null, vehicleNumber: 'TS08EF9012' },
            { id: 'BK003', vehicleType: 'Bike', pickup: 'Madhapur', drop: 'Gachibowli', fare: 28, status: 'completed', driver: 'Kavitha Naidu', driverRating: 4.6, date: new Date(Date.now() - 3600000 * 50), rating: 4, vehicleNumber: 'TS07GH3456' },
            { id: 'BK004', vehicleType: 'Cab', pickup: 'LB Nagar', drop: 'Secunderabad', fare: 110, status: 'cancelled', driver: null, driverRating: null, date: new Date(Date.now() - 3600000 * 75), rating: null, vehicleNumber: null },
            { id: 'BK005', vehicleType: 'Cab', pickup: 'Kondapur', drop: 'Charminar', fare: 135, status: 'completed', driver: 'Madhuri Rao', driverRating: 4.8, date: new Date(Date.now() - 3600000 * 100), rating: 5, vehicleNumber: 'TS11IJ7890', sos: true }
        ];

        let currentRating = 0;
        let ratingBookingId = null;
        let currentFilter = 'all';
        const icons = { Cab: '🚕', Auto: '🛺', Bike: '🛵' };

        function renderHistory(rides) {
            const list = document.getElementById('historyList');
            if (!rides.length) {
                list.innerHTML = '<div style="text-align:center;padding:60px;color:var(--gray-400)"><div style="font-size:3rem;margin-bottom:12px">🌸</div><p>No rides yet. Book your first safe ride!</p></div>';
                return;
            }
            list.innerHTML = rides.map(r => `
        <div class="ride-history-card ${r.sos ? 'sos-ride' : ''}">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="font-size:1.8rem">${icons[r.vehicleType] || '🚕'}</div>
              <div>
                <div style="font-weight:700;font-size:0.95rem">${r.vehicleType} Ride</div>
                <div style="font-size:0.78rem;color:var(--gray-500)">${formatDate(r.date)} ${r.vehicleNumber ? '· ' + r.vehicleNumber : ''}</div>
              </div>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800;font-size:1.1rem;color:var(--primary)">₹${r.fare}</div>
              <span class="badge ${r.status === 'completed' ? 'badge-success' : r.status === 'cancelled' ? 'badge-gray' : 'badge-warning'}">${r.status}</span>
            </div>
          </div>
          <div class="ride-route">
            <div style="display:flex;gap:8px;font-size:0.82rem"><span style="color:var(--success)">●</span>${r.pickup}, Hyderabad</div>
            <div style="border-left:1px dashed var(--gray-300);margin-left:5px;height:8px"></div>
            <div style="display:flex;gap:8px;font-size:0.82rem"><span style="color:var(--primary)">●</span>${r.drop}, Hyderabad</div>
          </div>
          ${r.driver ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
            <div style="font-size:0.82rem;color:var(--gray-500)">Driver: <strong>${r.driver}</strong> · ⭐${r.driverRating}</div>
            ${r.sos ? '<span class="badge badge-danger">🚨 SOS Triggered</span>' : ''}
            ${r.status === 'completed' && !r.rating ? `<button onclick="openRating('${r.id}','${r.driver}')" class="btn btn-sm btn-outline"><i class="fa-solid fa-star"></i> Rate</button>` : ''}
            ${r.rating ? `<div style="color:var(--warning);font-size:0.9rem">${'⭐'.repeat(r.rating)}</div>` : ''}
          </div>` : ''}
        </div>`).join('');
            // Update stats
            const completed = demoRides.filter(r => r.status === 'completed');
            document.getElementById('statRides').textContent = demoRides.length;
            document.getElementById('statSpent').textContent = '₹' + completed.reduce((s, r) => s + r.fare, 0);
            const rated = completed.filter(r => r.rating);
            document.getElementById('statAvgRating').textContent = rated.length ? (rated.reduce((s, r) => s + r.rating, 0) / rated.length).toFixed(1) + '⭐' : '--';
        }

        function filterHistory(filter) {
            currentFilter = filter;
            ['fAll', 'fCompleted', 'fCancelled', 'fSos'].forEach(id => {
                const btn = document.getElementById(id);
                btn.style.borderColor = 'var(--gray-200)'; btn.style.color = 'var(--gray-500)'; btn.style.background = 'white';
            });
            const active = { all: 'fAll', completed: 'fCompleted', cancelled: 'fCancelled', sos: 'fSos' }[filter];
            const btn = document.getElementById(active);
            btn.style.borderColor = 'var(--primary)'; btn.style.color = 'var(--primary)'; btn.style.background = 'var(--pink-50)';

            let filtered = demoRides;
            if (filter === 'completed') filtered = demoRides.filter(r => r.status === 'completed');
            if (filter === 'cancelled') filtered = demoRides.filter(r => r.status === 'cancelled');
            if (filter === 'sos') filtered = demoRides.filter(r => r.sos);
            renderHistory(filtered);
        }

        function formatDate(d) {
            const diff = Date.now() - d.getTime();
            if (diff < 3600000) return `${Math.round(diff / 60000)}m ago`;
            if (diff < 86400000) return `${Math.round(diff / 3600000)}h ago`;
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        }

        function openRating(bookingId, driverName) {
            ratingBookingId = bookingId;
            currentRating = 0;
            document.getElementById('ratingDriverInfo').innerHTML = `<div style="font-size:0.9rem;color:var(--gray-600)">Rating your ride with <strong>${driverName}</strong></div>`;
            updateStars(0);
            openModal('ratingModal');
        }

        function setRating(n) {
            currentRating = n;
            updateStars(n);
            const labels = ['', 'Poor 😞', 'Fair 😐', 'Good 🙂', 'Great 😊', 'Amazing! 🌸'];
            document.getElementById('ratingLabel').textContent = labels[n];
        }

        function updateStars(n) {
            document.querySelectorAll('.star-btn').forEach((b, i) => { b.textContent = i < n ? '⭐' : '☆'; });
        }

        async function submitRating() {
            if (!currentRating) { showToast('Please select a star rating', 'error'); return; }
            const feedback = document.getElementById('feedbackText').value;
            try {
                await API.post(`/booking/${ratingBookingId}/rate`, { rating: currentRating, feedback });
                const ride = demoRides.find(r => r.id === ratingBookingId);
                if (ride) ride.rating = currentRating;
                closeModal('ratingModal');
                showToast('Thank you for your feedback! 🌸', 'success');
                filterHistory(currentFilter);
            } catch (e) {
                showToast('Rating saved locally. Thanks! 🌸', 'success');
                closeModal('ratingModal');
                const ride = demoRides.find(r => r.id === ratingBookingId);
                if (ride) ride.rating = currentRating;
                filterHistory(currentFilter);
            }
        }

        // Initial render
        filterHistory('all');
    </script>
</body>

</html>
